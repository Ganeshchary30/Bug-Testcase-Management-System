<section class="contact-section section_padding">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <!-- Card Starts -->
        <div class="card shadow-lg border-0 rounded-lg">
          <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">UPDATE BUG DETAILS</h3>

            <form class="form-contact contact_form" action="{% url 'update_bug' %}" method="post" enctype="multipart/form-data">
              {% csrf_token %}

              <!-- ID Field -->
              <div class="form-group mb-3">
                <label for="id">Bug ID:</label>
                <input class="form-control" type="number" name="id" id="id" value="{{ bugs.id }}" readonly required>
              </div>

              <!-- Title -->
              <div class="form-group mb-3">
                <label for="title">Title:</label>
                <input class="form-control" type="text" name="title" id="title" value="{{ bugs.title }}" required>
              </div>

              <!-- Testcase Id -->
              <div class="form-group mb-3">
                <label for="testcase_id">Testcase ID:</label>
                <select name="testcase_id" id="testcase_id" class="form-control" required>
                  {% for testcase in testcaseids %}
                    <option value="{{ testcase.id }}" {% if testcase.id == bugs.testcase_id %}selected{% endif %}>{{ testcase.id }}</option>
                  {% endfor %}
                </select>
              </div>

              <!-- Description -->
              <div class="form-group mb-3">
                <label for="description">Description:</label>
                <textarea class="form-control" name="description" id="description" rows="3" required>{{ bugs.description }}</textarea>
              </div>

              <!-- Test Path -->
              <div class="form-group mb-3">
                <label for="test_path">Test URL/Path:</label>
                <input class="form-control" type="text" name="test_path" id="test_path" value="{{ bugs.test_path }}" required>
              </div>

              <!-- Screenshot -->
              <div class="form-group mb-3">
                <label for="screenshot">Screenshot:</label>
                <input class="form-control" type="file" name="screenshot" id="screenshot">
                {% if bugs.screenshot %}
                  <small class="form-text text-muted">
                    Current Screenshot: <a href="{{ bugs.screenshot.url }}" target="_blank">View Screenshot</a>
                  </small>
                {% endif %}
              </div>

              <!-- Severity -->
              <div class="form-group mb-3">
                <label for="severity">Severity:</label>
                <select name="sevearity" id="severity" class="form-control" required>
                  <option value="" disabled hidden>--SELECT--</option>
                  <option value="high" {% if bugs.sevearity == 'high' %}selected{% endif %}>HIGH</option>
                  <option value="medium" {% if bugs.sevearity == 'medium' %}selected{% endif %}>MEDIUM</option>
                  <option value="low" {% if bugs.sevearity == 'low' %}selected{% endif %}>LOW</option>
                </select>
              </div>

              <!-- Priority -->
              <div class="form-group mb-3">
                <label for="priority">Priority:</label>
                <select name="priority" id="priority" class="form-control" required>
                  <option value="" disabled hidden>--SELECT--</option>
                  <option value="high" {% if bugs.priority == 'high' %}selected{% endif %}>HIGH</option>
                  <option value="medium" {% if bugs.priority == 'medium' %}selected{% endif %}>MEDIUM</option>
                  <option value="low" {% if bugs.priority == 'low' %}selected{% endif %}>LOW</option>
                </select>
              </div>

              <!-- Reproduction Steps -->
              <div class="form-group mb-3">
                <label for="reproductionsteps">Reproduction Steps:</label>
                <textarea class="form-control" name="reproductionsteps" id="reproductionsteps" rows="3" required>{{ bugs.reproductionsteps }}</textarea>
              </div>

              <!-- Environments -->
              <div class="form-group mb-3">
                <label for="environment">Environments:</label>
                <input class="form-control" type="text" name="environment" id="environment" value="{{ bugs.environment }}" required>
              </div>

              <!-- Browser -->
              <div class="form-group mb-3">
                <label for="browser">Browser:</label>
                <select name="browser" id="browser" class="form-control" required>
                  <option value="" disabled hidden>--SELECT--</option>
                  <option value="Chrome" {% if bugs.browser == 'Chrome' %}selected{% endif %}>Chrome</option>
                  <option value="Firefox" {% if bugs.browser == 'Firefox' %}selected{% endif %}>Firefox</option>
                  <option value="Microsoft Edge" {% if bugs.browser == 'Microsoft Edge' %}selected{% endif %}>Microsoft Edge</option>
                </select>
              </div>

              <!-- OS -->
              <div class="form-group mb-3">
                <label for="os">Operating System (OS):</label>
                <select name="os" id="os" class="form-control" required>
                  <option value="" disabled hidden>--SELECT--</option>
                  <option value="Linux" {% if bugs.os == 'Linux' %}selected{% endif %}>Linux</option>
                  <option value="Syllable" {% if bugs.os == 'Syllable' %}selected{% endif %}>Syllable</option>
                  <option value="MS-Windows" {% if bugs.os == 'MS-Windows' %}selected{% endif %}>MS-Windows</option>
                  <option value="Mac OS" {% if bugs.os == 'Mac OS' %}selected{% endif %}>Mac OS</option>
                </select>
              </div>

              <!-- Error Details -->
              <div class="form-group mb-3">
                <label for="errordetails">Error Details:</label>
                <textarea class="form-control" name="errordetails" id="errordetails" rows="2" required>{{ bugs.errordetails }}</textarea>
              </div>

              <!-- Developer Email -->
              <div class="form-group mb-3">
                <label for="developer_email">Developer's Email:</label>
                <select name="developer_email" id="developer_email" class="form-control" required>
                  {% for developer in developersids %}
                    <option value="{{ developer.email }}" {% if developer.email == bugs.developer_email %}selected{% endif %}>{{ developer.email }}</option>
                  {% endfor %}
                </select>
              </div>

              <!-- Status -->
              <div class="form-group mb-3">
                <label for="status">Status:</label>
                <input class="form-control" type="text" name="status" id="status" value="{{ bugs.status }}" readonly required>
              </div>

              <!-- Date (Optional) -->
              <!--
              <div class="form-group mb-3">
                <label for="date">Date:</label>
                <input class="form-control" type="date" name="date" id="date" value="{{ bugs.date }}" required>
              </div>
              -->

              <!-- Tested By Email -->
              <div class="form-group mb-4">
                <label for="tested_by_email">Tested By (Email):</label>
                <input class="form-control" type="email" name="tested_by_email" id="tested_by_email" value="{{ tested_by }}" readonly required>
              </div>

              <!-- Submit Button -->
              <div class="d-grid gap-2">
                <button class="btn btn-primary btn-block" type="submit">Update Bug</button>
              </div>

              <!-- Message Display -->
              {% if msg %}
                <div class="alert alert-info mt-3 text-center">{{ msg }}</div>
              {% endif %}

            </form>
          </div>
        </div>
        <!-- Card Ends -->

      </div>
    </div>
  </div>
</section>
