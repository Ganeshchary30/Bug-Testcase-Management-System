  <!-- ================ contact section start ================= -->
  <section class="contact-section section_padding">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <h2 class="contact-title text-center">UPDATE TESTCASE</h2>
        <form class="form-contact contact_form" action="{% url 'update_testcase' %}" method="post" enctype="multipart/form-data">
          {% csrf_token %}

          <!-- ID (Readonly) -->
          <div class="form-group">
            <label>Enter Id:</label>
            <input class="form-control" type="number" name="id" value="{{ testcases.id }}" readonly required>
          </div>

          <!-- Scenario -->
          <div class="form-group">
            <label>Enter Title:</label>
            <input class="form-control" type="text" name="senario" value="{{ testcases.senario }}" placeholder="Enter scenario" required>
          </div>

          <!-- Project Name -->
          <div class="form-group">
            <label>Enter Project Name:</label>
            <select name="project_name" class="form-control" required>
              {% for project in details_project %}
                <option value="{{ project.title }}" {% if project.title == testcases.project_name %}selected{% endif %}>{{ project.title }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- Requirements -->
          <div class="form-group">
            <label>Enter Requirements Title:</label>
            <select name="requirements" class="form-control" required>
              {% for req in requirements %}
                <option value="{{ req.title }}" {% if req.title == testcases.requirements %}selected{% endif %}>{{ req.title }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- Module Name -->
          <div class="form-group">
            <label>Enter Module Name:</label>
            <input class="form-control" type="text" name="module_name" value="{{ testcases.module_name }}" placeholder="Enter module name" required>
          </div>

          <!-- Description -->
       <div class="form-group">
  <label>Enter Description:</label>
  <textarea class="form-control" rows="5" name="description" placeholder="Enter description" required>{{ testcases.description }}</textarea>
</div>

          <!-- Input Data -->
          <div class="form-group">
            <label>Enter Input Data:</label>
            <input class="form-control" type="text" name="input_data" value="{{ testcases.input_data }}" placeholder="Enter input data" required>
          </div>

          <!-- Type Of Testcase -->
          <div class="form-group">
            <label>Enter Type Of Testcase:</label>
            <select name="type_of_exception" class="form-control" required>
                <option value="" disabled selected hidden>--SELECT--</option>
              <option value="Functional" {% if testcases.type_of_exception == 'Functional' %}selected{% endif %}>Functional</option>
              <option value="Non-Functional" {% if testcases.type_of_exception == 'Non-Functional' %}selected{% endif %}>Non-Functional</option>
              <option value="GUI" {% if testcases.type_of_exception == 'GUI' %}selected{% endif %}>GUI</option>
              <option value="DataBases" {% if testcases.type_of_exception == 'DataBases' %}selected{% endif %}>DataBases</option>
              <option value="API" {% if testcases.type_of_exception == 'API' %}selected{% endif %}>API</option>
            </select>
          </div>

          <!-- Pre Condition -->
          <div class="form-group">
            <label>Enter Pre Condition:</label>
            <input class="form-control" type="text" name="pre_condition" value="{{ testcases.pre_condition }}" placeholder="Enter pre-condition" required>
          </div>

          <!-- Expected Result -->
          <div class="form-group">
            <label>Enter Expected Result:</label>
            <input class="form-control" type="text" name="expected_actual_result" value="{{ testcases.expected_actual_result }}" placeholder="Enter expected result" required>
          </div>

          <!-- Priority -->
          <div class="form-group">
            <label>Enter Priority:</label>
            <select name="priority" class="form-control" required>
                <option value="" disabled selected hidden>--SELECT--</option>
              <option value="high" {% if testcases.priority == 'high' %}selected{% endif %}>HIGH</option>
              <option value="medium" {% if testcases.priority == 'medium' %}selected{% endif %}>MEDIUM</option>
              <option value="low" {% if testcases.priority == 'low' %}selected{% endif %}>LOW</option>
            </select>
          </div>

          <!-- Test Steps -->
          <div class="form-group">
            <label>Enter Test Steps:</label>
            <input class="form-control" type="text" name="teststeps" value="{{ testcases.teststeps }}" placeholder="Enter test steps" required>
          </div>

          <!-- Status -->
          <div class="form-group">
            <label>Enter Status:</label>
            <input class="form-control" type="text" name="status" value="{{ testcases.status }}" placeholder="Enter status" required>
          </div>

          <!-- Tester Email -->
          <div class="form-group">
            <label>Enter Tester Email:</label>
            <input class="form-control" type="email" name="tester_email" value="{{ tester_emails }}" readonly required>
          </div>

          <!-- Submit Button -->
          <div class="form-group text-center">
            <button class="btn btn-primary btn-lg" type="submit">Update Testcase</button>
          </div>

          <!-- Message -->
          {% if msg %}
            <div class="alert alert-info text-center">{{ msg }}</div>
          {% endif %}

        </form>
      </div>
    </div>
  </div>
</section>
