  <body>

    <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->
<section class="contact-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
<!--                    <h2 class="contact-title text-center mb-4">Add Task</h2>-->
                    <form class="form-contact contact_form" action="{% url 'add_task' %}" method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Manager Email:</label>
                            <input class="form-control" type="email" name="manager_email" value="{{ mngr_email }}" required readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Status:</label>
                            <input class="form-control" type="text" name="status" value="new" required readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Employee Email:</label>
                            <select name="employee_email" class="form-control" required>
                                {% for details_emply in details_emply %}
                                    <option value="{{ details_emply.email }}">{{ details_emply.email }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Project:</label>
                            <select name="project" class="form-control" required>
                                {% for details_project in details_project %}
                                    <option value="{{ details_project.title }}">{{ details_project.title }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Description:</label>
                            <textarea class="form-control" name="description" rows="4" placeholder="Enter Description" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">End Date:</label>
                            <input class="form-control" type="date" id="enddate" name="enddate" required>
                        </div>

                        <div class="text-center">
                            <button class="btn btn-primary px-4 py-2" type="submit">Add Task</button>
                        </div>

                        <div class="mt-3 text-center text-success">
                            {{ msg }}
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</section>



  <script>
  document.addEventListener("DOMContentLoaded", function () {
    let dateInput = document.getElementById("enddate");
    let today = new Date().toISOString().split("T")[0];

    // Set minimum date to today
    dateInput.setAttribute("min", today);

    // Preserve previously entered value if editing
    if (dateInput.value) {
      dateInput.setAttribute("min", dateInput.value);
    }
  });
</script>
