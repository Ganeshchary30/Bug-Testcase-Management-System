<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8"/>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Bug And Testcase Management System</title>
    <link rel="icon" href="{% static 'img/bugs.jpg' %}" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <!-- animate CSS -->
    <link rel="stylesheet" href="{% static 'css/animate.css' %}" />
    <!-- owl carousel CSS -->
    <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}" />
    <!-- themify CSS -->
    <link rel="stylesheet" href="{% static 'css/themify-icons.css' %}" />
    <!-- flaticon CSS -->
    <link rel="stylesheet" href="{% static 'css/flaticon.css' %}" />
    <!-- font awesome CSS -->
    <link rel="stylesheet" href="{% static 'css/magnific-popup.css' %}" />
    <!-- swiper CSS -->
    <link rel="stylesheet" href="{% static 'css/slick.css' %}" />
    <!-- style CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <!--::header part start::-->
      {% include 'developer_header.html' %}

    <!-- breadcrumb start-->
    <section class="breadcrumb breadcrumb_bg align-items-center">
        <div class="container">
            <div class="row align-items-center justify-content-between">
                <div class="col-sm-6">
                    <div class="breadcrumb_tittle">
<!--                        <h2>status Update</h2>-->
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->
<section class="contact-section section_padding">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <h2 class="contact-title">UPDATE TASK STATUS</h2>
      </div>
      <div class="col-lg-8">
        <form class="form-contact contact_form" action="{% url 'developer_task_status_insert' %}" method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="row">
            <div class="col-7">
              Enter Bug_Id:
              <input class="form-control" type="number" name="id" value="{{id}}" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter bug id'" placeholder="Enter bug id" required readonly/><br>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-7">
              <div class="form-group">
                Enter Status:
                <select name="status" class="form-control" required>
      <option value="" disabled selected hidden>--SELECT--</option>
                  <option value="new" {% if tasks.status == 'new' %} selected {% endif %}>NEW</option>
                  <option value="completed" {% if tasks.status == 'completed' %} selected {% endif %}>COMPLETED</option>
                  <option value="improgress" {% if tasks.status == 'improgress' %} selected {% endif %}>IMPROGRESS</option>
                </select>
              </div>
            </div>
          </div>



          <button class="button" type="submit">UPDATE STATUS</button>
        </form>

        {{msg}}
      </div>
    </div>
  </div>
</section>


  <!-- ================ contact section end ================= -->

<!-- footer part start-->
<footer class="footer-area">
    <div class="container">
        <div class="row justify-content-between">
        <div class="col-sm-6 col-md-3 col-xl-3">
            <div class="single-footer-widget footer_1">



            </div>
        </div>
        <div class="col-xl-3 col-sm-6 col-md-3">
            <div class="single-footer-widget footer_2">



            </div>
        </div>
        <div class="col-xl-3 col-sm-6 col-md-3">
            <div class="single-footer-widget footer_2">



            </div>
        </div>

        <div class="col-xl-3 col-sm-6 col-md-3">
            <div class="single-footer-widget footer_2">


            </div>

        </div>
        </div>
    </div>
    <div class="container-fluid">
        <div class="row">
        <div class="col-lg-12">
            <div class="copyright_part_text text-center">
            <div class="row">
                <div class="col-lg-12">
                <p class="footer-text m-0" style="color:white">
                    <!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
Copyright &copy;<script>document.write(new Date().getFullYear());</script> All Rights Reserved
<!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
                </p>
                </div>
            </div>
            </div>
        </div>
        </div>
    </div>
    </footer>

    <!-- footer part end-->

    <!-- jquery plugins here-->
    <script src="{% static 'js/jquery-1.12.1.min.js' %}"></script>
    <!-- popper js -->
    <script src="{% static 'js/popper.min.js' %}"></script>
    <!-- bootstrap js -->
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <!-- easing js -->
    <script src="{% static 'js/jquery.magnific-popup.js' %}"></script>
    <!-- isotope js -->
    <script src="{% static 'js/isotope.pkgd.min.js' %}"></script>
    <!-- particles js -->
    <script src="{% static 'js/owl.carousel.min.js' %}"></script>

    <!--contact js-->
    <script src="{% static 'js/contact.js' %}"></script>
    <script src="{% static 'js/jquery.ajaxchimp.min.js' %}"></script>
    <script src="{% static 'js/jquery.form.js' %}"></script>
    <script src="{% static 'js/jquery.validate.min.js' %}"></script>
    <script src="{% static 'js/mail-script.js' %}"></script>
    <!-- custom js -->
    <script src="{% static 'js/custom.js' %}"></script>
</body>
</html>
