  <!-- ================ contact section start ================= -->
 <section class="contact-section section_padding">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <h2 class="contact-title">UPDATE PROFILE</h2>
      </div>
      <div class="col-lg-8">
        <form class="form-contact contact_form" action="{% url 'analyst_update_profile' %}" method="post">
          {% csrf_token %}

          <!-- Employee ID -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Id:</label>
              <input class="form-control" type="number" name="id" value="{{ employ.id }}" required readonly>
            </div>
          </div>

          <!-- Employee EmpId -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Emp Id:</label>
              <input class="form-control" type="number" name="empid" value="{{ employ.empid }}" required readonly>
            </div>
          </div>

          <!-- Employee Name -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Emp Name:</label>
              <input class="form-control" type="text" name="empname" value="{{ employ.empname }}" required>
            </div>
          </div>

          <!-- Job Selection -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Job:</label>
              <select name="job" class="form-control" required>
                <option value="" disabled hidden>--SELECT--</option>
                <option value="manager" {% if employ.job == 'manager' %}selected{% endif %}>MANAGER</option>
                <option value="tester" {% if employ.job == 'tester' %}selected{% endif %}>TESTING</option>
                <option value="devloper" {% if employ.job == 'devloper' %}selected{% endif %}>DEVELOPER</option>
                <option value="analyst" {% if employ.job == 'analyst' %}selected{% endif %}>ANALYST</option>
              </select>
            </div>
          </div>

          <!-- Email -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Email:</label>
              <input class="form-control" type="email" name="email" value="{{ employ.email }}" required readonly>
            </div>
          </div>

          <!-- Password (Hidden) -->
          <input type="hidden" name="password" value="{{ employ.password }}">

          <!-- Date of Join -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Date Of Join:</label>
              <input class="form-control" type="date" name="dateofjoin" value="{{ employ.dateofjoin|date:'Y-m-d' }}" required>
            </div>
          </div>

          <!-- Salary -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Salary:</label>
              <input class="form-control" type="number" name="salary" value="{{ employ.salary }}" required>
            </div>
          </div>

          <!-- Gender -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Gender:</label>
              <select name="gender" class="form-control" required>
                <option value="Male" {% if employ.gender == 'Male' %}selected{% endif %}>MALE</option>
                <option value="Female" {% if employ.gender == 'Female' %}selected{% endif %}>FEMALE</option>
                <option value="Others" {% if employ.gender == 'Others' %}selected{% endif %}>OTHERS</option>
              </select>
            </div>
          </div>

          <!-- Role -->
          <div class="row mb-3">
            <div class="col-7">
              <label>Enter Role:</label>
              <select name="role" class="form-control" required>
                <option value="" disabled hidden>--SELECT--</option>
                <option value="tester" {% if employ.role == 'tester' %}selected{% endif %}>TESTING</option>
                <option value="devloper" {% if employ.role == 'devloper' %}selected{% endif %}>DEVELOPER</option>
                <option value="manager" {% if employ.role == 'manager' %}selected{% endif %}>MANAGER</option>
                <option value="analyst" {% if employ.role == 'analyst' %}selected{% endif %}>ANALYST</option>
              </select>
            </div>
          </div>

          <!-- Submit Button -->
          <div class="row">
            <div class="col-12">
              <button class="button" type="submit">Update Profile</button>
            </div>
          </div>

        </form>

        <!-- Success/Error Message -->
        {% if msg %}
          <div class="alert alert-info mt-3">
            {{ msg }}
          </div>
        {% endif %}

      </div>
    </div>
  </div>
</section>
