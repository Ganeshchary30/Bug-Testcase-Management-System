  <!-- ================ contact section start ================= -->
<section class="contact-section section_padding">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <h2 class="contact-title">UPDATE TASK</h2>
      </div>

      <div class="col-lg-8">
        <form class="form-contact contact_form"
              action="{% url 'update_task' %}"
              method="post"
              novalidate="novalidate"
              enctype="multipart/form-data">

          {% csrf_token %}

          <!-- Task ID -->
          <div class="row">
            <div class="col-7">
              Enter Id:
              <input class="form-control"
                     type="number" readonly
                     name="id"
                     value="{{ tasks.id }}"><br>
            </div>
          </div>

          <!-- Manager Email -->
          <div class="row">
            <div class="col-7">
              Enter Manager Email:
              <input class="form-control"
                     type="email" readonly
                     name="manager_email"
                     value="{{ mngr_email }}"><br>
            </div>
          </div>

          <!-- Status (Readonly) -->
          <div class="row">
            <div class="col-sm-7">
              <div class="form-group">
                Enter Status:
                <input class="form-control"
                       type="text"
                       name="status"
                       value="new"
                       readonly><br>
              </div>
            </div>
          </div>

          <!-- Employee Email Dropdown -->
          <div class="row">
            <div class="col-sm-7">
              <div class="form-group">
                Enter Employee Email:
                <select name="employee_email"
                        class="form-control" required>
                  <option value="">Select Employee</option>
                  {% for details_emply in details_emply %}
                  <option value="{{ details_emply.email }}"
                    {% if details_emply.email == tasks.employee_email %} selected {% endif %}>
                    {{ details_emply.email }}
                  </option>
                  {% endfor %}
                </select><br>
              </div>
            </div>
          </div>

        <!-- Project Input (Readonly) -->
<div class="row">
  <div class="col-sm-7">
    <div class="form-group">
      <label>Enter Project:</label>
      <input type="text" name="project" class="form-control"
             value="{{ tasks.project }}" readonly> <!-- 🔥 Selected project only -->
    </div>
  </div>
</div>


      <!-- Description -->
<div class="row">
  <div class="col-sm-7">
    <div class="form-group">
      <label>Enter Description:</label>
      <textarea class="form-control"
                name="description"
                rows="5"
                onfocus="this.placeholder = ''"
                onblur="this.placeholder = 'Enter description'"
                placeholder="Enter description">{{ tasks.description }}</textarea> <!-- 🔥 Prefilled from backend -->
    </div>
  </div>
</div>


          <!-- End Date -->
          <div class="row">
            <div class="col-sm-7">
              <div class="form-group">
                Enter End Date:
                <input class="form-control"
                       type="date" id=enddate
                       name="enddate"
                       value="{{ tasks.enddate|date:'Y-m-d' }}"
                       onfocus="this.placeholder = ''"
                       onblur="this.placeholder = 'Enter enddate'"
                       placeholder="Enter enddate"><br>
              </div>
            </div>
          </div>

          <!-- Submit Button -->
          <button class="button btn-primary" type="submit">Update Task</button>
        </form>

        <!-- Message Display -->
        <div class="mt-3">
          {% if msg %}
            <div class="alert alert-info">{{ msg }}</div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</section>


      <script>
  document.addEventListener("DOMContentLoaded", function () {
    let dateInput = document.getElementById("enddate");
    let today = new Date().toISOString().split("T")[0];

    // Set minimum date to today
    dateInput.setAttribute("min", today);

    // Preserve previously entered value if editing
    if (dateInput.value) {
      dateInput.setAttribute("min", dateInput.value);
    }
  });
</script>
