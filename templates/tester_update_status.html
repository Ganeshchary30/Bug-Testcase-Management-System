  <!-- ================ contact section start ================= -->
  <section class="contact-section section_padding">
  <div class="container">
    <div class="row justify-content-center"> <!-- centers the form horizontally -->
      <div class="col-lg-8">
        <div class="card shadow p-4 rounded"> <!-- add some style with a card -->

          <h2 class="text-center mb-4">UPDATE  BUG STATUS</h2>

          <form class="form-contact contact_form" action="{% url 'tester_status_insert' %}" method="post" enctype="multipart/form-data" novalidate="novalidate">
            {% csrf_token %}

            <!-- Bug ID (Readonly) -->
            <div class="form-group mb-3">
              <label for="bug_id" class="form-label">Bug ID:</label>
              <input class="form-control" id="bug_id" type="number" name="id" value="{{ bugs.id }}" readonly>
            </div>

            <!-- Status Dropdown -->
            <div class="form-group mb-3">
              <label for="status" class="form-label">Status:</label>
              <select name="status" id="status" class="form-control" required>
                  <option value="" disabled selected hidden>--SELECT--</option>
                <option value="closed" {% if bugs.status == 'closed' %}selected{% endif %}>CLOSED</option>
                <option value="reopen" {% if bugs.status == 'reopen' %}selected{% endif %}>REOPEN</option>
              </select>
            </div>

            <!-- Tested By Email (Readonly) -->
            <div class="form-group mb-4">
              <label for="tested_by_email" class="form-label">Tested By Email:</label>
              <input class="form-control" id="tested_by_email" type="email" name="tested_by_email" value="{{ email }}" readonly required>
            </div>

            <!-- Submit Button -->
            <div class="text-center">
              <button class="btn btn-primary px-4 py-2" type="submit">UPDATE STATUS</button>
            </div>
          </form>

          {% if msg %}
            <div class="alert alert-info mt-3 text-center">{{ msg }}</div>
          {% endif %}

        </div>
      </div>
    </div>
  </div>
</section>
