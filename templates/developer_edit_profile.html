  <!-- ================ contact section start ================= -->
<section class="contact-section section_padding">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <h2 class="contact-title">UPDATE PROFILE</h2>
      </div>

      <div class="col-lg-8">
        <form class="form-contact contact_form" action="{% url 'developer_update_profile' %}" method="post">
          {% csrf_token %}

          <div class="row">
            <div class="col-7">
              Enter Id:
              <input class="form-control" type="number" name="id" value="{{ employ.id }}" required readonly><br>
            </div>
          </div>

          <div class="row">
            <div class="col-7">
              Enter Emp Id:
              <input class="form-control" type="number" name="empid" value="{{ employ.empid }}" required readonly><br>
            </div>
          </div>

          <div class="row">
            <div class="col-7">
              Enter Emp Name:
              <input class="form-control" type="text" name="empname" value="{{ employ.empname }}" required><br>
            </div>
          </div>

          <!-- JOB DROPDOWN -->
          <div class="row">
            <div class="col-7">
              <div class="form-group">
                Enter Job:
                <select name="job" class="form-control" required>
                  <option value="" disabled {% if not employ.job %}selected{% endif %}>--SELECT--</option>
                  <option value="tester" {% if employ.job == "tester" %}selected{% endif %}>TESTING</option>
                  <option value="devloper" {% if employ.job == "devloper" %}selected{% endif %}>DEVELOPER</option>
                  <option value="analyst" {% if employ.job == "analyst" %}selected{% endif %}>ANALYST</option>
                  <option value="manager" {% if employ.job == "manager" %}selected{% endif %}>MANAGER</option>
                </select>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-7">
              <div class="form-group">
                Enter Email:
                <input class="form-control" type="email" name="email" value="{{ employ.email }}" required readonly>
              </div>
            </div>
          </div>

          <!-- HIDDEN PASSWORD -->
          <div class="row">
            <div class="col-7">
              <div class="form-group">
                <input class="form-control" type="hidden" name="password" value="{{ employ.password }}" required readonly>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-7">
              <div class="form-group">
                Enter Date Of Join:
                <input class="form-control" type="date" name="dateofjoin" value="{{ employ.dateofjoin|date:'Y-m-d' }}" required><br>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-7">
              <div class="form-group">
                Enter Salary:
                <input class="form-control" type="number" name="salary" value="{{ employ.salary }}" required><br>
              </div>
            </div>
          </div>

          <!-- GENDER DROPDOWN -->
          <div class="row">
            <div class="col-7">
              <div class="form-group">
                Enter Gender:
                <select name="gender" class="form-control" required>
                  <option value="Male" {% if employ.gender == "Male" %}selected{% endif %}>MALE</option>
                  <option value="Female" {% if employ.gender == "Female" %}selected{% endif %}>FEMALE</option>
                  <option value="Others" {% if employ.gender == "Others" %}selected{% endif %}>OTHERS</option>
                </select>
              </div>
            </div>
          </div>

          <!-- ROLE DROPDOWN -->
          <div class="row">
            <div class="col-7">
              <div class="form-group">
                Enter Role:
                <select name="role" class="form-control" required>
                  <option value="" disabled {% if not employ.role %}selected{% endif %}>--SELECT--</option>
                  <option value="tester" {% if employ.role == "tester" %}selected{% endif %}>TESTING</option>
                  <option value="devloper" {% if employ.role == "devloper" %}selected{% endif %}>DEVELOPER</option>
                  <option value="analyst" {% if employ.role == "analyst" %}selected{% endif %}>ANALYST</option>
                  <option value="manager" {% if employ.role == "manager" %}selected{% endif %}>MANAGER</option>
                </select>
              </div>
            </div>
          </div>

          <button class="button" type="submit">Update Developer</button>
        </form>
        {{ msg }}
      </div>
    </div>
  </div>
</section>
