    <section class="contact-section section_padding">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <h2 class="contact-title text-center mb-4">UPDATE  TESTCASE STATUS</h2>

        <form class="form-contact contact_form p-4 shadow rounded bg-light"
              action="{% url 'employee_update_testcases_status_insert' %}"
              method="post"
              novalidate="novalidate"
              enctype="multipart/form-data">

          {% csrf_token %}

          <div class="form-group mb-3">
            <label for="id">Testcase ID</label>
            <input class="form-control"
                   type="number"
                   id="id"
                   name="id"
                   value="{{ testcases.id }}"
                   readonly>
          </div>

          <div class="form-group mb-3">
            <label for="status">Status</label>
            <select id="status" name="status" class="form-control" required>
      <option value="" disabled selected hidden>--SELECT--</option>
              <option value="Pass" {% if testcases.status == "Pass" %}selected{% endif %}>Pass</option>
              <option value="Fail" {% if testcases.status == "Fail" %}selected{% endif %}>Fail</option>
            </select>
          </div>

          <div class="form-group mb-3">
            <label for="comments">Comments</label>
            <textarea class="form-control"
                      id="comments"
                      name="comments"
                      placeholder="Enter Comments"
                      required>{{ testcases.comments }}</textarea>
          </div>

          <div class="form-group mb-4">
            <label for="tested_by_email">Tested By Email</label>
            <input class="form-control"
                   type="email"
                   id="tested_by_email"
                   name="tested_by_email"
                   value="{{ email }}"
                   readonly>
          </div>

          <div class="text-center">
            <button class="btn btn-primary px-5 py-2" type="submit">Update Status</button>
          </div>

        </form>

        {% if msg %}
          <p class="text-center text-success mt-3">{{ msg }}</p>
        {% endif %}
      </div>
    </div>
  </div>
</section>
