<!doctype html>
{% load static %}
<head>

    <meta charset="utf-8"/>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Bug And Testcase Management System</title>
    <link rel="icon" href="{% static 'img/bugs.jpg' %}" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <!-- animate CSS -->
    <link rel="stylesheet" href="{% static 'css/animate.css' %}" />
    <!-- owl carousel CSS -->
    <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}" />

  <body>
    <!--::header part start::-->
    <header class="main_menu home_menu">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-lg-12">
            <nav class="navbar navbar-expand-lg navbar-light">
              <a class="navbar-brand" href="#">
                  <h4 style="color:white;">Bug And Testcase Management System</h4>
              </a>
              <button
                class="navbar-toggler"
                type="button"
                data-toggle="collapse"
                data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent"
                aria-expanded="false"
                aria-label="Toggle navigation"
              >
                <span class="ti-menu"></span>
              </button>

              <div
                class="collapse navbar-collapse main-menu-item justify-content-center"
                id="navbarSupportedContent"
              >
                <ul class="navbar-nav align-items-center">
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'index' %}">Home</a>
                  </li>
<!--                  <li class="nav-item">-->
<!--                    <a class="nav-link" href="{% url 'about' %}">About</a>-->
<!--                  </li>-->
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'blog' %}">About Us</a>
                  </li>

                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}">Contact</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="{% url 'admins' %}">Admin</a>
                  </li>

<li class="nav-item dropdown">
                    <a
                      class="nav-link dropdown-toggle"
                    >
                      Employees
                    </a>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                      <a class="dropdown-item" href="{% url 'management' %}">Manager</a>

                      <a class="dropdown-item" href="{% url 'developer' %}">Developer</a>
                      <a class="dropdown-item" href="{% url 'employee' %}">Tester</a>
                      <a class="dropdown-item" href="{% url 'analyst_login' %}">Analyst</a>
                    </div>
                  </li>
                </ul>
              </div>

            </nav>
          </div>
        </div>
      </div>
    </header>
    <!-- Header part end-->

    <!-- breadcrumb start-->
    <section class="breadcrumb breadcrumb_bg align-items-center">
        <div class="container">
            <div class="row align-items-center justify-content-between">
                <div class="col-sm-6">
                    <div class="breadcrumb_tittle">
<!--                        <p>Home . Developer</p>-->
<!--                        <h2>Developer</h2>-->
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- breadcrumb start-->

  <!-- ================ contact section start ================= -->
  <section class="contact-section ">
    <div class="container">
      <div class="row">
        <div class="col-12">
            <br>

            <h6 style="color:red">{{msg}}</h6>

          <h2 class="contact-title">DEVELOPER LOGIN</h2>
        </div>
        <div class="col-lg-8">
          <form class="form-contact contact_form" action="{% url 'developer' %}" method="post">
            {% csrf_token %}
              <div class="col-sm-8">
                <div class="form-group">
                    Enter Email
                  <input class="form-control" type="email" name="email"  onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter email'" placeholder = 'Enter Email' required><br>
                </div>
              </div>
              <div class="col-sm-8">
                <div class="form-group">
                    Enter Password
                  <input class="form-control" type="password" name="password" onfocus="this.placeholder = ''" onblur="this.placeholder = 'Enter password'" placeholder = 'Enter Password' required><br>
                </div>
              </div>


              <div class="col-8">
                <div class="form-group">
                    Enter Role
                    <select name="role" class="form-control" required>
      <option value="" disabled selected hidden>--SELECT--</option>
                        <option value="tester">TESTING</option>
<!--                        <option value="developer">DEVELOPER</option>--> devloper
                        <option value="devloper">DEVELOPER</option>
                        <option value="analyst">ANALYST</option>
                        <option value="manager">MANAGER</option>
                    </select>
                </div>
              </div>





<div class="col-sm-8">
                <div class="form-group">
                    <button class="button" type="submit">DEVELOPER LOGIN</button>

            </div></div>
          </form>
        </div>
        </div>
      </div>
  </section>

  <!-- ================ contact section end ================= -->

    <!-- bootstrap js -->
    <script src="{% static 'js/bootstrap.min.js' %}"></script>

    <script src="{% static 'js/jquery.magnific-popup.js' %}"></script>

    <script src="{% static 'js/contact.js' %}"></script>
