  <!-- ================ contact section start ================= -->
 <section class="contact-section">
    <div class="container">
        <div class="row">
            <div class="col-12 text-center mb-4">
                <br>
                <br>
                <h2 class="contact-title">ADD BUG</h2>
            </div>
            <div class="col-lg-8 mx-auto">
                <form class="form-contact contact_form" action="{% url 'add_bug' %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Enter Title:</label>
                        <input class="form-control" type="text" name="title" placeholder="Enter Title" required>
                    </div>

                    <div class="form-group">
                        <label>Enter Testcases ID:</label>
                        <select name="testcase_id" class="form-control" required>
                            {% for testcaseids in testcaseids %}
                                <option value="{{testcaseids.id}}">{{testcaseids.id}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Enter Description:</label>
                        <textarea class="form-control" name="description" rows="4" placeholder="Enter Description" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Enter URL:</label>
                        <input class="form-control" type="url" name="test_path" placeholder="Enter URL" required>
                    </div>

                    <div class="form-group">
                        <label>Enter Screenshot:</label>
                        <input class="form-control" type="file" name="screenshot" required>
                    </div>

                    <div class="form-group">
                        <label>Enter Severity:</label>
                        <select name="sevearity" class="form-control" required>
                            <option value="" disabled selected>--SELECT--</option>
                            <option value="high">HIGH</option>
                            <option value="medium">MEDIUM</option>
                            <option value="low">LOW</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Enter Priority:</label>
                        <select name="priority" class="form-control" required>
                            <option value="" disabled selected>--SELECT--</option>
                            <option value="high">HIGH</option>
                            <option value="medium">MEDIUM</option>
                            <option value="low">LOW</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Enter Reproduction Steps:</label>
                        <input class="form-control" type="text" name="reproductionsteps" placeholder="Enter Reproduction Steps" required>
                    </div>

                    <div class="form-group">
                        <label>Enter Environments:</label>
                        <input class="form-control" type="text" name="environment" placeholder="Enter Environments" required>
                    </div>

                    <div class="form-group">
                        <label>Enter Browser:</label>
                        <select name="browser" class="form-control" required>
                            <option value="" disabled selected>--SELECT--</option>
                            <option value="Chrome">Chrome</option>
                            <option value="Firefox">Firefox</option>
                            <option value="Microsoft Edge">Microsoft Edge</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Enter OS:</label>
                        <select name="os" class="form-control" required>
                            <option value="" disabled selected>--SELECT--</option>
                            <option value="Linux">Linux</option>
                            <option value="Syllable">Syllable</option>
                            <option value="MS-Windows">MS-Windows</option>
                            <option value="Mac OS">Mac OS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Enter Error Details:</label>
                        <input class="form-control" type="text" name="errordetails" placeholder="Enter Error Details" required>
                    </div>

                    <div class="form-group">
                        <label>Enter Developer ID:</label>
                        <select name="developer_email" class="form-control" required>
                            {% for developersids in developersids %}
                                <option value="{{developersids.email}}">{{developersids.email}}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status:</label>
                        <input class="form-control" type="text" name="status" value="new" readonly required>
                    </div>

                    <div class="form-group">
                        <label>Tested By Email:</label>
                        <input class="form-control" type="email" name="tested_by_email" value="{{tested_by}}" readonly required>
                    </div>

                    <div class="text-center">
                        <button class="btn btn-primary" type="submit">Add Bug</button>
                    </div>
                </form>
                <div class="text-center mt-3">{{msg}}</div>
            </div>
        </div>
    </div>
</section>
